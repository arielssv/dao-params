name: Update Gas Data

on:
  schedule:
    - cron: '0 6 * * *' # Daily at 6:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download gas price CSV from Etherscan
        run: curl -sf "https://etherscan.io/chart/gasprice?output=csv" -o public/gas-data.csv

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/gas-data.csv
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update gas price data $(date -u +%Y-%m-%d)"
            git pull --rebase
            git push
          fi
