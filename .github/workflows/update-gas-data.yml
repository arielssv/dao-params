name: Update Gas Data

on:
  schedule:
    - cron: '0 6 * * *' # Daily at 6:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Download gas price CSV from Etherscan
        run: curl -s "https://etherscan.io/chart/gasprice?output=csv" -o public/gas-data.csv

      - name: Check if data changed
        id: diff
        run: |
          git diff --quiet public/gas-data.csv && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/gas-data.csv
          git commit -m "chore: update gas price data $(date -u +%Y-%m-%d)"
          git push
