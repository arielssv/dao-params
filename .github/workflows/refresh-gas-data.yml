name: Refresh Gas Data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download CSV
        run: curl -sf "https://etherscan.io/chart/gasprice?output=csv" -o public/gas-data.csv

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/gas-data.csv
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: update gas price data $(date -u +%Y-%m-%d)"
          git fetch origin main
          git rebase origin/main
          git push
